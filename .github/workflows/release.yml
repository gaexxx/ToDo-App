name: Build release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: My-ToDo
  QT_VERSION: "6.8.3"

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          cache: true

      - name: Build application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          Push-Location build
          qmake ..\mytodo.pro CONFIG+=release
          nmake
          Pop-Location

      - name: Deploy Qt dependencies
        shell: pwsh
        run: |
          $package = "dist\${{ env.APP_NAME }}-windows-x64"
          New-Item -ItemType Directory -Force $package | Out-Null

          $exe = Get-ChildItem -Path build -Recurse -Filter "${{ env.APP_NAME }}.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Executable ${{ env.APP_NAME }}.exe not found"
          }

          Copy-Item $exe.FullName $package
          windeployqt --release --compiler-runtime "$package\${{ env.APP_NAME }}.exe"
          Compress-Archive -Path $package -DestinationPath "${{ env.APP_NAME }}-windows-x64.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip

  build-linux:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libfuse2 patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: gcc_64
          cache: true

      - name: Build application
        run: |
          mkdir -p build
          cd build
          qmake ../mytodo.pro CONFIG+=release
          make -j"$(nproc)"

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp "build/${APP_NAME}" "AppDir/usr/bin/${APP_NAME}"
          chmod +x "AppDir/usr/bin/${APP_NAME}"

          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-appimage-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          QT_BIN="$(dirname "$(command -v qmake)")"
          QT_ROOT="$(cd "$QT_BIN/.." && pwd)"
          export QMAKE="$QT_BIN/qmake"
          export LD_LIBRARY_PATH="$QT_ROOT/lib:${LD_LIBRARY_PATH:-}"
          export EXTRA_QT_MODULES="svg;"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable "AppDir/usr/bin/${APP_NAME}" \
            --desktop-file "packaging/${APP_NAME}.desktop" \
            --icon-file "packaging/${APP_NAME}.svg" \
            --plugin qt \
            --output appimage

          mv "${APP_NAME}"-*.AppImage "${APP_NAME}-linux-x86_64.AppImage"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x86_64
          path: ${{ env.APP_NAME }}-linux-x86_64.AppImage

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*